<!DOCTYPE html>
<html lang="en">

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      GitHub Pages caches the served HTML for ~10 minutes by default. The Vite
      bundle filenames are content-hashed, so the JS/CSS are safe to cache
      forever — but the HTML that *points* to them must always be re-fetched,
      otherwise users keep loading the previous bundle for ten minutes after
      every deploy. These meta tags tell the browser to never reuse a cached
      copy of index.html.
    -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma"        content="no-cache" />
    <meta http-equiv="Expires"       content="0" />
    <title>CareStream</title>
    <!-- SPA redirect restore: reads the path encoded by 404.html and restores it via history API -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
