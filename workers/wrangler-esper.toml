name = "worker-esper"
main = "worker-esper.js"
compatibility_date = "2024-11-01"

# ESPER_API_KEY is a Worker Secret (Cloudflare dashboard or
# `wrangler secret put ESPER_API_KEY -c workers/wrangler-esper.toml`).
# Deploy with --keep-vars so dashboard secrets/vars are preserved:
#
#   npx wrangler deploy -c workers/wrangler-esper.toml --keep-vars
